<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MyLife OS</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet"/>
  <style>
    body { margin: 0; background: #f7f6f2; }
    #root { min-height: 100vh; }
    /* Loading screen */
    #loading { position:fixed; inset:0; background:#f7f6f2; display:flex; align-items:center; justify-content:center; font-family:'DM Serif Display',serif; font-size:1.5rem; color:#1a1917; letter-spacing:-0.02em; }
  </style>
</head>
<body>
  <div id="loading">MyLife OS</div>
  <div id="root"></div>
  <script type="text/babel" src="app.js"></script>
  <script>
    // Hide loading screen once React mounts
    window.addEventListener('load', () => {
      setTimeout(() => {
        const l = document.getElementById('loading');
        if (l) l.style.display = 'none';
      }, 400);
    });
  </script>
</body>
</html>
